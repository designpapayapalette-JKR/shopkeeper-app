name: Build APK (Shopkeeper App)

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild (generate android/ folder)
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        working-directory: android
        env:
          GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=1g
          EXPO_PUBLIC_API_URL: https://api.managemycounter.com
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release.apk shopkeeper-app-latest.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: shopkeeper-app-apk
          path: shopkeeper-app-latest.apk

      - name: Upload to existing release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload beta-latest shopkeeper-app-latest.apk --clobber
